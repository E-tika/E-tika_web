<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>期末試験過去問 - 経済学部同好会</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <a href="../../index.html">
                <img src="../../images/banana.png" alt="ロゴ" class="logo-img"> 
                <span>経済学部同好会</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="../room-reserve/index.html">購読室予約</a>
            <a href="../past-exam/index.html">期末試験過去問</a>
            <a href="../printer-reserve/index.html">印刷室</a>
            <a href="../seminar-info/index.html">ゼミ紹介</a>
            <a href="../contact/index.html">お問い合わせ</a>
        </nav>
    </header>

    <main class="container">
        <section id="auth-section">
            <h1>過去試験の閲覧について</h1>
            <p>このページは経済学部生専用の過去問閲覧用のページです。<br>
                学生番号を入力することで閲覧いただけます。<br>
                他学部の方は、お問い合わせフォームから閲覧申請をしてください。<br>
                <span style="color: red;">本ページは長期にわたって来訪者がいない場合、停止している場合がございます。<br>
                    ページが開けない等のトラブルがあった際は、お問い合わせください。</span>
            </p>
            
            <div class="login-card">
                <div class="input-group">
                    <label>学生番号</label>
                    <input type="text" id="student-id-input" placeholder="例: ハイフンなし10桁">
                </div>
                <button onclick="handleLogin()" class="btn-blue">ログイン</button>
                <p id="error-message" class="error-text" style="display: none;">※学生番号が登録されていません。</p>
            </div>
        </section>

        <section id="exam-section" style="display: none;">
            <h1>過去問アーカイブ</h1>
            <p id="welcome-msg"></p>
            <div id="exam-list" class="exam-grid">
                <p>現在、表示できる過去問はありません。</p>
            </div>
        </section>
    </main>

    <script src="past-exam.js"></script>
    <footer class="main-footer">
    <p>&copy; 2026 経済学部同好会常任委員会</p>
</footer>
</body>
</html>
