<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>期末試験過去問 - 経済学部同好会</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <a href="../../index.html">
                <img src="../../images/banana.png" alt="ロゴ" class="logo-img"> 
                <span>経済学部同好会</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="../room-reserve/index.html">購読室予約</a>
            <a href="../past-exam/index.html">期末試験過去問</a>
            <a href="../printer-reserve/index.html">印刷室</a>
            <a href="../seminar-info/index.html">ゼミ紹介</a>
            <a href="../contact/index.html">お問い合わせ</a>
        </nav>
    </header>

    <main class="container">
        <section id="auth-section">
            <h1>過去試験の閲覧について</h1>
            <p>このページは経済学部生専用の過去問閲覧ページです。<br>
                <strong>学籍番号</strong>と<strong>登録したパスワード</strong>を入力してログインしてください。
            </p>
            
            <div class="login-card">
                <div class="input-group">
                    <label for="student-id-input">学籍番号</label>
                    <input type="text" id="student-id-input" placeholder="例: 0400XXXXXX">
                </div>

                <div class="input-group">
                    <label for="password-input">パスワード</label>
                    <input type="password" id="password-input" placeholder="パスワードを入力">
                </div>

                <button onclick="handleLogin()" class="btn-blue">ログイン</button>
                
                <p id="error-message" class="error-text" style="display: none;"></p>

                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                
                <div class="auth-helper-links">
                    <p>初めての方：<a href="https://forms.gle/c5DinY2Zb8FaVTHBA" target="_blank">パスワードを登録する</a></p>
                    <p>忘れた方：<a href="https://forms.gle/hyNZuhrxv9xJ9o418" target="_blank">再設定はこちら</a></p>
                </div>
            </div>

            <div class="warning-box">
                <p style="color: red; font-size: 0.9em;">
                    ※本ページは長期にわたって来訪者がいない場合、停止している場合がございます。<br>
                    ページが開けない等のトラブルがあった際は、お問い合わせください。
                </p>
            </div>
        </section>

        <section id="exam-section" style="display: none;">
            <h1>過去問アーカイブ</h1>
            <p id="welcome-msg"></p>
            <div id="exam-list" class="exam-grid">
                <p>現在、表示できる過去問はありません。</p>
            </div>
        </section>
    </main>

    <script src="past-exam.js"></script>
    <footer class="main-footer">
        <p>&copy; 2026 経済学部同好会常任委員会</p>
    </footer>
</body>
</html>
