<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>過去問リスト - 経済学部同好会</title>
    <link rel="icon" href="../../images/banana.png" type="image/png">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="past-exam.js" defer></script>
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <a href="../../index.html">
                <img src="../../images/banana.png" alt="ロゴ" class="logo-img"> 
                <span>京都大学経済学部同好会</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="../room-reserve/index.html">購読室予約</a>
            <a href="../past-exam/index.html">期末試験過去問</a>
            <a href="../printer-reserve/index.html">印刷室</a>
            <a href="../seminar-info/index.html">ゼミ紹介</a>
            <a href="../contact/index.html">お問い合わせ</a>
        </nav>
    </header>

    <main class="container past-exam-layout">
        <div class="list-section">
            <h1>過去問アーカイブ</h1>
            <p>年度を選択すると右側にプレビューが表示されます。<br>
            （スマートフォンで閲覧する場合は，プレビューが反映されません．）
            </p>

            <div class="exam-vertical-list">
                <div class="exam-item-row" onclick="viewPdf('exam2025.pdf', '2025年度')">
                    <span class="exam-year">2025年度 期末試験</span>
                    <div class="action-buttons">
                        <button class="view-btn">プレビュー</button>
                        <a href="javascript:void(0)" class="download-btn" onclick="event.stopPropagation(); viewPdf('exam2025.pdf', '2025年度', true);">別タブで開く</a>
                    </div>
                </div>

                <div class="exam-item-row" onclick="viewPdf('exam2024.pdf', '2024年度')">
                    <span class="exam-year">2024年度 期末試験</span>
                    <div class="action-buttons">
                        <button class="view-btn">プレビュー</button>
                        <a href="javascript:void(0)" class="download-btn" onclick="event.stopPropagation(); viewPdf('exam2024.pdf', '2024年度', true);">別タブで開く</a>
                    </div>
                </div>

                <div class="exam-item-row" onclick="viewPdf('exam2023.pdf', '2023年度')">
                    <span class="exam-year">2023年度 期末試験</span>
                    <div class="action-buttons">
                        <button class="view-btn">プレビュー</button>
                        <a href="javascript:void(0)" class="download-btn" onclick="event.stopPropagation(); viewPdf('exam2023.pdf', '2023年度', true);">別タブで開く</a>
                    </div>
                </div>
            </div>
        </div>

        <div id="preview-container" class="preview-section">
            <h3 id="preview-title">年度を選択してください</h3>
            <div class="iframe-wrapper">
                <iframe id="pdf-preview-frame" src="" frameborder="0"></iframe>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 経済学部同好会常任委員会</p>
        <p class="version-info">ver. 1.0.0</p>
    </footer>
</body>
</html>
