    <div class="alert-banner">
            2026年5月11日以降の購読室予約は、こちらで行ってください。

    <div class="reservation-system">

            <p id="selected-date-display" class="date-badge">選択した日付: ----/--/--</p>

                    <li>重複予約は先の予約を優先します。</li>

                </ul>
            </div>
            
            <a href="https://forms.gle/4aS3mjFwKEQWe5k79" target="_blank" class="reserve-button">
                🗓️ 予約フォームを開く
            </a>
        </div>

        <div class="timetable-area">
            <div id="timetable-container">
                <p>日付を選択してください。</p>
            </div>
        </div>
    </div>
