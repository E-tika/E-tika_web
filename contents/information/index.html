            <h1>京都大学経済学部での学び</h1>
            
            <div class="intro-text">
                <p>京都大学経済学部では3年生よりゼミに入ることが可能となっており、2年の11月に選考が始まります。</p>
                <p>経済学部同好会では10月末～11月始めに経済学部ゼミ合同説明会を開催しております。</p>
                <p>ゼミへの参加は必須ではありませんが、卒業論文を執筆する場合は必要となります。</p>
