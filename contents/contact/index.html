<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>お問い合わせ - 経済学部同好会</title>
    <link rel="icon" href="../../images/banana.png" type="image/png">
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-logo">
            <a href="../../index.html">
                <img src="../../images/banana.png" alt="ロゴ" class="logo-img"> 
                <span>京都大学経済学部同好会</span>
            </a>
        </div>
        <nav class="nav-links">
            <a href="../room-reserve/index.html">購読室予約</a>
            <a href="../past-exam/index.html">期末試験過去問</a>
            <a href="../printer-reserve/index.html">印刷室</a>
            <a href="../seminar-info/index.html">ゼミ紹介</a>
            <a href="../contact/index.html">お問い合わせ</a>
        </nav>
    </header>

    <main class="container">
    <h1>お問い合わせ</h1>
    
    <div class="contact-notice">
        <p class="highlight-text">
            試験過去問の会員登録についてのお問い合わせには、必ず入学年度を明記してください。
        </p>

        <p>お問い合わせは、以下のメールアドレスにて受け付けております。</p>

        <div class="mail-box">
            <p class="mail-address">
                📩 <span id="target-email">e.doukoukai@gmail.com</span>
            </p>
            <button onclick="copyEmail()" id="copy-btn" class="btn-copy">
                アドレスをコピーする
            </button>
        </div>

        <div class="info-required">
            <h3>📝 メールに記載いただきたい内容</h3>
            <ul>
                <li><strong>① 氏名</strong></li>
                <li><strong>② お問い合わせ内容</strong></li>
                <li><strong>③ 返信用メールアドレス</strong></li>
            </ul>
        </div>
    </div>
</main>

<script>
function copyEmail() {
    // アドレスを取得
    const emailText = document.getElementById('target-email').innerText;
    const btn = document.getElementById('copy-btn');

    // クリップボードにコピー
    navigator.clipboard.writeText(emailText).then(() => {
        // ボタンの文字を変えて通知
        const originalText = btn.innerText;
        btn.innerText = "コピーしました！";
        btn.classList.add('copied');

        // 2秒後に元の文字に戻す
        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.remove('copied');
        }, 2000);
    });
}
</script>

    <footer class="main-footer">
    <p>&copy; 2026 経済学部同好会常任委員会</p>
    <p class="version-info">ver. 1.0.0</p>
</footer>
</body>
</html>
